
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF8F4;
    --warm-white: #FFFFFF;
    --sand-100: #F2EDE4;
    --sand-200: #E5DDD0;
    --sand-400: #C4B49A;
    --sand-600: #8C7A63;
    --sage-100: #E8EDE8;
    --sage-400: #7A9B7A;
    --sage-600: #4F7050;
    --terracotta: #C16E5A;
    --terracotta-light: #F5EBE8;
    --text-primary: #2D2A26;
    --text-secondary: #6B6459;
    --text-muted: #9E9488;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .header-icon {
    width: 56px; height: 56px;
    background: var(--sand-100);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    font-size: 26px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 0.35rem;
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  .card {
    background: var(--warm-white);
    border-radius: var(--radius);
    border: 1px solid var(--sand-200);
    box-shadow: var(--shadow);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .section-label {
    font-size: 0.78rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 0.85rem;
  }

  .drop-zone {
    border: 1.5px dashed var(--sand-400);
    border-radius: var(--radius-sm);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--cream);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--sage-400);
    background: var(--sage-100);
  }
  .drop-zone .dz-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    opacity: 0.5;
  }
  .drop-zone p { font-size: 0.9rem; color: var(--text-secondary); }
  .drop-zone span { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; display: block; }
  input[type="file"] { display: none; }

  .file-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--sage-100);
    border-radius: var(--radius-sm);
    border: 1px solid #C2D4C2;
  }
  .file-info-icon { font-size: 1.4rem; }
  .file-name { font-size: 0.9rem; font-weight: 500; color: var(--text-primary); }
  .file-meta { font-size: 0.78rem; color: var(--text-muted); }
  .clear-btn {
    margin-left: auto;
    background: none; border: none;
    cursor: pointer; font-size: 1rem;
    color: var(--text-muted); padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--terracotta); }

  .page-range-input {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1.5px solid var(--sand-200);
    border-radius: var(--radius-sm);
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .page-range-input:focus {
    border-color: var(--sage-400);
    background: #fff;
  }
  .page-range-input.error { border-color: var(--terracotta); }

  .hint-row {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-top: 0.6rem;
  }
  .hint-chip {
    font-size: 0.75rem;
    padding: 3px 10px;
    background: var(--sand-100);
    border-radius: 20px;
    color: var(--text-secondary);
    cursor: pointer;
    border: 1px solid var(--sand-200);
    transition: background 0.15s;
    font-family: monospace;
  }
  .hint-chip:hover { background: var(--sand-200); }

  .error-msg {
    font-size: 0.8rem;
    color: var(--terracotta);
    margin-top: 0.4rem;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 0.75rem;
    margin-top: 0.5rem;
  }

  .page-thumb {
    position: relative;
    border-radius: var(--radius-sm);
    border: 2px solid var(--sand-200);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    background: var(--sand-100);
  }
  .page-thumb:hover { transform: translateY(-2px); border-color: var(--sand-400); }
  .page-thumb.selected {
    border-color: var(--sage-400);
    box-shadow: 0 0 0 3px rgba(122,155,122,0.2);
  }
  .page-thumb canvas { width: 100%; display: block; }
  .page-num {
    text-align: center;
    font-size: 0.72rem;
    padding: 4px 0;
    color: var(--text-muted);
    background: var(--warm-white);
  }
  .page-thumb.selected .page-num {
    background: var(--sage-100);
    color: var(--sage-600);
    font-weight: 500;
  }
  .selected-badge {
    position: absolute; top: 5px; right: 5px;
    width: 18px; height: 18px;
    background: var(--sage-400);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: white;
    opacity: 0; transition: opacity 0.15s;
  }
  .page-thumb.selected .selected-badge { opacity: 1; }

  .selected-count {
    font-size: 0.82rem;
    color: var(--sage-600);
    font-weight: 500;
    margin-top: 0.75rem;
  }

  .actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  .btn-primary {
    flex: 1; min-width: 160px;
    padding: 0.75rem 1.5rem;
    background: var(--text-primary);
    color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 0.92rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-primary:hover { background: #1a1714; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--sand-400); cursor: not-allowed; }

  .btn-secondary {
    padding: 0.75rem 1.25rem;
    background: var(--cream);
    color: var(--text-secondary);
    border: 1.5px solid var(--sand-200);
    border-radius: var(--radius-sm);
    font-size: 0.88rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .btn-secondary:hover { border-color: var(--sand-400); background: var(--sand-100); }

  .progress-wrap {
    margin-top: 1rem;
    background: var(--sand-100);
    border-radius: 20px; height: 6px;
    overflow: hidden; display: none;
  }
  .progress-bar {
    height: 100%; background: var(--sage-400);
    border-radius: 20px;
    transition: width 0.3s ease;
  }
  .status-text {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    text-align: center;
    display: none;
  }

  .toast {
    position: fixed;
    bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--text-primary);
    color: #fff;
    padding: 0.65rem 1.25rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .loading-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .app { padding: 1.25rem 1rem 3rem; }
    h1 { font-size: 1.25rem; }
    .card { padding: 1.2rem; }
    .preview-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
    .actions { flex-direction: column; }
    .btn-primary { min-width: unset; }
  }
</style>

<div class="app">
  <div class="header">
    <div class="header-icon">📄</div>
    <h1>PDF 頁面拆分工具</h1>
    <p class="subtitle">上傳 PDF，指定頁次，輸出新的 PDF 檔案</p>
  </div>

  <div class="card" id="uploadCard">
    <div class="section-label">上傳檔案</div>
    <div class="drop-zone" id="dropZone">
      <div class="dz-icon">📂</div>
      <p>點擊選擇或拖曳 PDF 檔案至此</p>
      <span>支援 .pdf 格式</span>
    </div>
    <input type="file" id="fileInput" accept=".pdf,application/pdf">
    <div class="file-info" id="fileInfo" style="display:none; margin-top:0.75rem;">
      <span class="file-info-icon">📄</span>
      <div>
        <div class="file-name" id="fileName"></div>
        <div class="file-meta" id="fileMeta"></div>
      </div>
      <button class="clear-btn" id="clearBtn" title="移除檔案">✕</button>
    </div>
  </div>

  <div class="card" id="rangeCard" style="display:none;">
    <div class="section-label">指定頁次</div>
    <input type="text" class="page-range-input" id="pageRange" placeholder="例如：1, 3-5, 7, 10-12" autocomplete="off">
    <div class="hint-row">
      <span class="hint-chip" data-val="1">1</span>
      <span class="hint-chip" data-val="1-3">1-3</span>
      <span class="hint-chip" data-val="1,3,5">1,3,5</span>
      <span class="hint-chip" data-val="2-4,7,9-11">2-4,7,9-11</span>
    </div>
    <div class="error-msg" id="rangeError" style="display:none;"></div>
    <div class="selected-count" id="selectedCount" style="display:none;"></div>
  </div>

  <div class="card" id="previewCard" style="display:none;">
    <div class="section-label">頁面預覽 <span id="previewNote" style="font-size:0.75rem; color:var(--text-muted); text-transform:none; font-weight:400; letter-spacing:0;">（點擊縮圖可快速選取／取消）</span></div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <div class="actions" id="actionsRow" style="display:none;">
    <button class="btn-primary" id="extractBtn" disabled>
      <div class="loading-spinner" id="spinner"></div>
      <span id="btnText">✂️ 擷取指定頁面</span>
    </button>
    <button class="btn-secondary" id="selectAllBtn">全選</button>
    <button class="btn-secondary" id="clearSelBtn">清除</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="status-text" id="statusText"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

const { PDFLib } = window;

let pdfDoc = null;
let totalPages = 0;
let pdfArrayBuffer = null;
let selectedPages = new Set();
let thumbsRendered = false;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileMeta = document.getElementById('fileMeta');
const clearBtn = document.getElementById('clearBtn');
const rangeCard = document.getElementById('rangeCard');
const pageRange = document.getElementById('pageRange');
const rangeError = document.getElementById('rangeError');
const selectedCount = document.getElementById('selectedCount');
const previewCard = document.getElementById('previewCard');
const previewGrid = document.getElementById('previewGrid');
const actionsRow = document.getElementById('actionsRow');
const extractBtn = document.getElementById('extractBtn');
const selectAllBtn = document.getElementById('selectAllBtn');
const clearSelBtn = document.getElementById('clearSelBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const statusText = document.getElementById('statusText');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');
const toast = document.getElementById('toast');

function showToast(msg, duration=2800) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
clearBtn.addEventListener('click', resetAll);

async function handleFile(file) {
  if (!file.type.includes('pdf') && !file.name.endsWith('.pdf')) {
    showToast('⚠️ 請選擇 PDF 格式的檔案');
    return;
  }
  fileName.textContent = file.name;
  fileMeta.textContent = formatBytes(file.size);
  fileInfo.style.display = 'flex';
  dropZone.style.display = 'none';

  const ab = await file.arrayBuffer();
  pdfArrayBuffer = ab;

  try {
    pdfDoc = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise;
    totalPages = pdfDoc.numPages;
    fileMeta.textContent = `${formatBytes(file.size)}  ·  ${totalPages} 頁`;

    rangeCard.style.display = 'block';
    previewCard.style.display = 'block';
    actionsRow.style.display = 'flex';
    pageRange.value = '';
    selectedPages.clear();
    thumbsRendered = false;
    await renderThumbs();
    thumbsRendered = true;
    updateActions();
  } catch(e) {
    showToast('❌ 無法讀取 PDF，請確認檔案是否損壞');
    resetAll();
  }
}

async function renderThumbs() {
  previewGrid.innerHTML = '';
  const scale = 1.2;
  for (let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const vp = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    const wrap = document.createElement('div');
    wrap.className = 'page-thumb';
    wrap.dataset.page = i;
    const badge = document.createElement('div');
    badge.className = 'selected-badge'; badge.textContent = '✓';
    const numDiv = document.createElement('div');
    numDiv.className = 'page-num'; numDiv.textContent = `第 ${i} 頁`;
    wrap.appendChild(canvas); wrap.appendChild(badge); wrap.appendChild(numDiv);
    wrap.addEventListener('click', () => togglePage(i, wrap));
    previewGrid.appendChild(wrap);
  }
}

function togglePage(n, el) {
  if (selectedPages.has(n)) {
    selectedPages.delete(n);
    el.classList.remove('selected');
  } else {
    selectedPages.add(n);
    el.classList.add('selected');
  }
  syncRangeInput();
  updateActions();
}

function syncRangeInput() {
  if (selectedPages.size === 0) { pageRange.value = ''; return; }
  const sorted = [...selectedPages].sort((a,b)=>a-b);
  const parts = [];
  let start = sorted[0], end = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] === end+1) { end = sorted[i]; }
    else { parts.push(start===end ? `${start}` : `${start}-${end}`); start = end = sorted[i]; }
  }
  parts.push(start===end ? `${start}` : `${start}-${end}`);
  pageRange.value = parts.join(', ');
}

function parseRange(str) {
  const pages = new Set();
  const errs = [];
  const parts = str.split(/[,，\s]+/).filter(Boolean);
  for (const p of parts) {
    const trimmed = p.trim();
    if (/^\d+$/.test(trimmed)) {
      const n = parseInt(trimmed);
      if (n < 1 || n > totalPages) errs.push(`頁碼 ${n} 超出範圍`);
      else pages.add(n);
    } else if (/^\d+-\d+$/.test(trimmed)) {
      const [a,b] = trimmed.split('-').map(Number);
      if (a > b) errs.push(`${a}-${b} 範圍錯誤（起始頁大於結束頁）`);
      else if (a < 1 || b > totalPages) errs.push(`${a}-${b} 超出範圍（共 ${totalPages} 頁）`);
      else for (let i=a; i<=b; i++) pages.add(i);
    } else if (trimmed) {
      errs.push(`無法解析「${trimmed}」`);
    }
  }
  return { pages, errs };
}

pageRange.addEventListener('input', () => {
  const val = pageRange.value.trim();
  rangeError.style.display = 'none';
  pageRange.classList.remove('error');
  if (!val) {
    selectedPages.clear();
    updateThumbSelection();
    updateActions();
    return;
  }
  const { pages, errs } = parseRange(val);
  if (errs.length) {
    rangeError.textContent = errs[0];
    rangeError.style.display = 'block';
    pageRange.classList.add('error');
  }
  selectedPages = pages;
  updateThumbSelection();
  updateActions();
});

document.querySelectorAll('.hint-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    pageRange.value = chip.dataset.val;
    pageRange.dispatchEvent(new Event('input'));
  });
});

function updateThumbSelection() {
  document.querySelectorAll('.page-thumb').forEach(el => {
    const n = parseInt(el.dataset.page);
    if (selectedPages.has(n)) el.classList.add('selected');
    else el.classList.remove('selected');
  });
}

function updateActions() {
  const n = selectedPages.size;
  if (n > 0) {
    selectedCount.textContent = `已選取 ${n} 頁`;
    selectedCount.style.display = 'block';
    extractBtn.disabled = false;
  } else {
    selectedCount.style.display = 'none';
    extractBtn.disabled = true;
  }
}

selectAllBtn.addEventListener('click', () => {
  for (let i=1; i<=totalPages; i++) selectedPages.add(i);
  updateThumbSelection();
  syncRangeInput();
  updateActions();
});

clearSelBtn.addEventListener('click', () => {
  selectedPages.clear();
  updateThumbSelection();
  pageRange.value = '';
  rangeError.style.display = 'none';
  pageRange.classList.remove('error');
  updateActions();
});

extractBtn.addEventListener('click', async () => {
  if (selectedPages.size === 0) return;
  extractBtn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = '處理中…';
  progressWrap.style.display = 'block';
  statusText.style.display = 'block';

  try {
    const sorted = [...selectedPages].sort((a,b)=>a-b);
    statusText.textContent = `正在擷取 ${sorted.length} 頁…`;
    progressBar.style.width = '20%';

    const srcDoc = await PDFLib.PDFDocument.load(pdfArrayBuffer.slice(0));
    progressBar.style.width = '45%';

    const newDoc = await PDFLib.PDFDocument.create();
    const indices = sorted.map(p => p-1);
    const copied = await newDoc.copyPages(srcDoc, indices);
    progressBar.style.width = '70%';

    copied.forEach(p => newDoc.addPage(p));
    statusText.textContent = '正在產生 PDF…';
    progressBar.style.width = '88%';

    const bytes = await newDoc.save();
    progressBar.style.width = '100%';

    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `extracted_pages_${sorted.join('-')}.pdf`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`✅ 已成功匯出 ${sorted.length} 頁 PDF`);
  } catch(e) {
    showToast('❌ 發生錯誤，請重新嘗試');
    console.error(e);
  } finally {
    setTimeout(() => {
      progressWrap.style.display = 'none';
      progressBar.style.width = '0%';
      statusText.style.display = 'none';
    }, 1200);
    spinner.style.display = 'none';
    btnText.textContent = '✂️ 擷取指定頁面';
    extractBtn.disabled = selectedPages.size === 0;
  }
});

function resetAll() {
  pdfDoc = null; pdfArrayBuffer = null; totalPages = 0;
  selectedPages.clear(); thumbsRendered = false;
  fileInput.value = '';
  fileInfo.style.display = 'none';
  dropZone.style.display = 'block';
  rangeCard.style.display = 'none';
  previewCard.style.display = 'none';
  actionsRow.style.display = 'none';
  previewGrid.innerHTML = '';
  pageRange.value = '';
  rangeError.style.display = 'none';
  selectedCount.style.display = 'none';
  progressWrap.style.display = 'none';
  statusText.style.display = 'none';
}
</script>
