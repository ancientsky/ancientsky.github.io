<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Studio — 頁面拆分與重組工具</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FAF8F4;
  --warm-white: #FFFFFF;
  --sand-50: #F7F4EF;
  --sand-100: #EEE9DF;
  --sand-200: #DDD5C6;
  --sand-400: #B8A88E;
  --sand-600: #8C7A63;
  --sage-100: #E4EDE5;
  --sage-200: #C5D9C7;
  --sage-400: #7A9B7A;
  --sage-600: #4F7050;
  --sage-800: #2E4830;
  --terra-100: #F5EBE8;
  --terra-400: #C16E5A;
  --terra-600: #9B4E3C;
  --blue-100: #E8EFF7;
  --blue-400: #5B85C0;
  --amber-100: #FBF0DC;
  --amber-400: #C9922A;
  --text-primary: #2D2A26;
  --text-secondary: #5A5450;
  --text-muted: #9E9488;
  --border: #DDD5C6;
  --border-focus: #7A9B7A;
  --r: 10px;
  --r-sm: 6px;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

html { font-size: 16px; }
body {
  font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
  background: var(--cream);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.app-header {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0.85rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  position: sticky; top: 0; z-index: 100;
}
.header-logo {
  width: 34px; height: 34px;
  background: var(--sand-100);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-title { font-size: 1rem; font-weight: 500; letter-spacing: -0.01em; }
.header-sub { font-size: 0.78rem; color: var(--text-muted); }
.header-actions { margin-left: auto; display: flex; gap: 0.5rem; }

/* ── Layout ── */
.app-body {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 0;
  flex: 1;
  min-height: 0;
}

/* ── Left Panel ── */
.left-panel {
  background: var(--warm-white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 57px);
  overflow: hidden;
}
.panel-section {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.panel-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.75rem;
}
.section-label {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
}

/* ── Drop Zone ── */
.drop-zone {
  border: 1.5px dashed var(--sand-400);
  border-radius: var(--r-sm);
  padding: 1.2rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--cream);
}
.drop-zone:hover, .drop-zone.over {
  border-color: var(--sage-400);
  background: var(--sage-100);
}
.drop-zone p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
.drop-zone span { font-size: 0.74rem; color: var(--text-muted); }
input[type=file] { display: none; }

/* ── Source File List ── */
.source-list { display: flex; flex-direction: column; gap: 0.5rem; }
.source-item {
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--sand-50);
  overflow: hidden;
}
.source-item-head {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.55rem 0.75rem;
  cursor: pointer;
  user-select: none;
}
.source-item-head:hover { background: var(--sand-100); }
.src-icon { font-size: 1.1rem; flex-shrink: 0; }
.src-name {
  font-size: 0.8rem; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.src-pages {
  font-size: 0.72rem; color: var(--text-muted);
  flex-shrink: 0;
}
.src-remove {
  background: none; border: none; cursor: pointer;
  font-size: 0.85rem; color: var(--text-muted);
  padding: 2px 4px; border-radius: 4px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.src-remove:hover { color: var(--terra-400); }
.src-thumb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
  gap: 5px;
  padding: 0 0.75rem 0.75rem;
}
.src-thumb {
  border-radius: 4px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--sand-100);
  position: relative;
}
.src-thumb:hover { border-color: var(--sage-400); transform: translateY(-1px); }
.src-thumb.added { border-color: var(--sage-400); background: var(--sage-100); }
.src-thumb canvas, .src-thumb img { width: 100%; display: block; }
.src-thumb-num {
  text-align: center;
  font-size: 0.64rem;
  padding: 2px 0 3px;
  color: var(--text-muted);
  background: var(--warm-white);
}
.src-thumb.added .src-thumb-num { color: var(--sage-600); background: var(--sage-100); }
.add-badge {
  position: absolute; top: 3px; right: 3px;
  width: 14px; height: 14px;
  background: var(--sage-400);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: white;
  opacity: 0; transition: opacity 0.15s;
}
.src-thumb.added .add-badge { opacity: 1; }
.add-all-row {
  padding: 0 0.75rem 0.65rem;
  display: flex; gap: 0.4rem;
}
.mini-btn {
  font-size: 0.72rem;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--warm-white);
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s;
  font-family: inherit;
}
.mini-btn:hover { background: var(--sand-100); border-color: var(--sand-400); }

/* ── Right Panel (Canvas) ── */
.right-panel {
  display: flex; flex-direction: column;
  height: calc(100vh - 57px);
  overflow: hidden;
}
.canvas-toolbar {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.25rem;
  display: flex; align-items: center; gap: 0.75rem;
  flex-wrap: wrap;
}
.toolbar-group { display: flex; gap: 0.4rem; align-items: center; }
.toolbar-sep {
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 0.25rem;
}
.tb-btn {
  padding: 0.4rem 0.75rem;
  font-size: 0.78rem; font-family: inherit;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--warm-white);
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s;
  display: flex; align-items: center; gap: 0.3rem;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--sand-100); border-color: var(--sand-400); }
.tb-btn.danger:hover { background: var(--terra-100); border-color: var(--terra-400); color: var(--terra-600); }
.tb-btn.primary {
  background: var(--text-primary); color: white; border-color: var(--text-primary);
}
.tb-btn.primary:hover { background: #1a1714; }
.tb-btn.primary:disabled { background: var(--sand-400); border-color: var(--sand-400); cursor: not-allowed; }
.canvas-info {
  margin-left: auto;
  font-size: 0.78rem; color: var(--text-muted);
}

.canvas-area {
  flex: 1; overflow-y: auto;
  padding: 1.25rem;
  background: var(--cream);
}

/* ── Canvas Empty State ── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%;
  gap: 0.75rem;
  opacity: 0.55;
}
.empty-state-icon { font-size: 3rem; }
.empty-state p { font-size: 0.9rem; color: var(--text-secondary); text-align: center; }

/* ── Page Cards Grid ── */
.page-canvas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
  align-content: start;
}
.page-canvas.list-view {
  grid-template-columns: 1fr;
}

.page-card {
  background: var(--warm-white);
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  cursor: grab;
  transition: box-shadow 0.2s, transform 0.15s, border-color 0.15s;
  position: relative;
  user-select: none;
}
.page-card:hover {
  box-shadow: var(--shadow);
  border-color: var(--sand-400);
}
.page-card.selected {
  border-color: var(--sage-400);
  box-shadow: 0 0 0 3px rgba(122,155,122,0.2), var(--shadow);
}
.page-card.sortable-ghost {
  opacity: 0.35;
}
.page-card.sortable-drag {
  box-shadow: var(--shadow-lg);
  cursor: grabbing;
}

.card-preview {
  width: 100%;
  overflow: hidden;
  background: var(--sand-100);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  min-height: 100px;
}
.card-preview canvas, .card-preview img {
  width: 100%; display: block;
  transition: transform 0.25s ease;
}
.card-preview .rotation-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; color: var(--text-muted);
  background: rgba(250,248,244,0.7);
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
}

.card-footer {
  padding: 0.5rem 0.6rem;
  display: flex; align-items: center; gap: 0.35rem;
}
.card-source-badge {
  font-size: 0.62rem;
  padding: 2px 6px;
  border-radius: 20px;
  background: var(--sand-100);
  color: var(--text-muted);
  border: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 70px;
}
.card-page-num {
  font-size: 0.7rem;
  color: var(--text-secondary);
  flex: 1;
}
.card-actions {
  display: flex; gap: 2px;
}
.card-btn {
  width: 22px; height: 22px;
  background: none; border: none;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; color: var(--text-muted);
  transition: all 0.15s;
  padding: 0;
}
.card-btn:hover { background: var(--sand-100); color: var(--text-primary); }
.card-btn.remove:hover { background: var(--terra-100); color: var(--terra-400); }

/* Rotation badge */
.rotation-badge {
  position: absolute; top: 5px; left: 5px;
  font-size: 0.6rem; padding: 1px 5px;
  background: rgba(45,42,38,0.7); color: white;
  border-radius: 20px;
  opacity: 0; transition: opacity 0.15s;
}
.page-card[data-rotation]:not([data-rotation="0"]) .rotation-badge { opacity: 1; }

/* Select checkbox */
.card-select-overlay {
  position: absolute; top: 6px; right: 6px;
  width: 18px; height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--sage-600);
  transition: all 0.15s;
}
.page-card.selected .card-select-overlay {
  background: var(--sage-400);
  border-color: var(--sage-400);
  color: white;
}

/* ── List view card ── */
.page-canvas.list-view .page-card {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.6rem 0.75rem;
  border-radius: var(--r-sm);
}
.page-canvas.list-view .card-preview {
  width: 50px; flex-shrink: 0; min-height: unset;
  border-radius: 4px; overflow: hidden;
}
.page-canvas.list-view .card-footer {
  flex: 1; padding: 0;
}
.page-canvas.list-view .card-select-overlay {
  position: relative; top: unset; right: unset;
  margin-right: 0.25rem;
}

/* ── Bottom bar ── */
.bottom-bar {
  background: var(--warm-white);
  border-top: 1px solid var(--border);
  padding: 0.75rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
  flex-wrap: wrap;
}
.progress-wrap {
  flex: 1; min-width: 100px;
  background: var(--sand-100);
  border-radius: 20px; height: 5px;
  overflow: hidden; display: none;
}
.progress-bar {
  height: 100%; background: var(--sage-400);
  border-radius: 20px; transition: width 0.3s ease;
}
.status-text { font-size: 0.78rem; color: var(--text-muted); display: none; }
.stats-text { font-size: 0.78rem; color: var(--text-muted); margin-left: auto; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--text-primary); color: white;
  padding: 0.6rem 1.1rem; border-radius: var(--r-sm);
  font-size: 0.82rem; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  transform: translateX(-50%) translateY(8px);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Color stripe for sources ── */
.stripe-0 { background: #E8EDE8; color: #4F7050; border-color: #C5D9C7; }
.stripe-1 { background: #E8EFF7; color: #2E5490; border-color: #B5CDE8; }
.stripe-2 { background: #FBF0DC; color: #8A5F1A; border-color: #F5D99A; }
.stripe-3 { background: #F5EBE8; color: #9B4E3C; border-color: #ECC5BA; }
.stripe-4 { background: #F0EBF7; color: #6040A0; border-color: #D4C5E8; }
.stripe-5 { background: #E8F5F0; color: #2A7060; border-color: #B0D8CE; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sand-200); border-radius: 20px; }
::-webkit-scrollbar-thumb:hover { background: var(--sand-400); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .app-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .left-panel { height: auto; max-height: 42vh; }
  .right-panel { height: calc(58vh - 57px); }
  .page-canvas { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
}
@media (max-width: 480px) {
  .canvas-toolbar { gap: 0.4rem; }
  .tb-btn { padding: 0.35rem 0.55rem; font-size: 0.72rem; }
  .bottom-bar { gap: 0.5rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-logo">📑</div>
  <div>
    <div class="header-title">PDF Studio</div>
    <div class="header-sub">拆分 · 重組 · 旋轉 · 合併</div>
  </div>
</header>

<div class="app-body">
  <!-- Left Panel -->
  <aside class="left-panel">
    <div class="panel-section">
      <div class="section-head">
        <span class="section-label">上傳 PDF 檔案</span>
      </div>
      <div class="drop-zone" id="dropZone">
        <div style="font-size:1.8rem; margin-bottom:0.4rem; opacity:0.5">📂</div>
        <p>點擊或拖曳 PDF 至此<br>可同時上傳多個檔案</p>
        <span style="margin-top:0.25rem; display:block;">支援 .pdf 格式</span>
      </div>
      <input type="file" id="fileInput" accept=".pdf,application/pdf" multiple>
    </div>
    <div class="panel-section" style="flex:1; overflow-y:auto; padding-top:0.75rem;">
      <div class="section-head" style="padding-top:0.25rem;">
        <span class="section-label">來源檔案</span>
        <span id="sourceCount" style="font-size:0.72rem; color:var(--text-muted);">尚無檔案</span>
      </div>
      <div class="source-list" id="sourceList">
        <div style="text-align:center; padding:1.5rem 0; color:var(--text-muted); font-size:0.8rem;">
          上傳 PDF 後，在此選取要加入的頁面
        </div>
      </div>
    </div>
  </aside>

  <!-- Right Panel -->
  <main class="right-panel">
    <div class="canvas-toolbar">
      <div class="toolbar-group">
        <button class="tb-btn" id="rotateLeftBtn" title="向左旋轉 90°">↺ 左轉 90°</button>
        <button class="tb-btn" id="rotate180Btn" title="旋轉 180°">↕ 180°</button>
        <button class="tb-btn" id="rotateRightBtn" title="向右旋轉 90°">↻ 右轉 90°</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <button class="tb-btn" id="selectAllCanvasBtn">全選</button>
        <button class="tb-btn" id="selectNoneBtn">取消</button>
        <button class="tb-btn danger" id="removeSelectedBtn">移除選取</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <button class="tb-btn" id="viewToggleBtn" title="切換檢視">⊞ 格狀</button>
      </div>
      <div class="canvas-info" id="canvasInfo">0 頁</div>
    </div>

    <div class="canvas-area" id="canvasArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">🗂️</div>
        <p>從左側點擊頁面縮圖<br>將頁面加入組合</p>
      </div>
      <div class="page-canvas" id="pageCanvas" style="display:none;"></div>
    </div>

    <div class="bottom-bar">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar" style="width:0"></div>
      </div>
      <div class="status-text" id="statusText"></div>
      <button class="tb-btn primary" id="exportBtn" disabled style="padding:0.55rem 1.25rem; font-size:0.85rem;">
        ⬇ 匯出 PDF
      </button>
      <div class="stats-text" id="statsText">尚無頁面</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
const pdfjsLib = window['pdfjs-dist/build/pdf'];
// Render on the main thread (no web worker). This works under the file://
// protocol where cross-origin worker scripts are blocked. The harmless
// "deprecated API" console notice can be ignored.
pdfjsLib.GlobalWorkerOptions.workerSrc = '';

const { PDFLib } = window;

const sources = [];      // { id, name, size, pdfDoc, arrayBuffer, thumbDataURLs[] }
const canvasPages = [];  // { sourceId, pageIndex, rotation, cardEl }
let selectedCards = new Set(); // indices in canvasPages
let isGridView = true;
let sortable = null;

// ── DOM refs ───────────────────────────────────────────────────
const dropZone      = document.getElementById('dropZone');
const fileInput     = document.getElementById('fileInput');
const sourceList    = document.getElementById('sourceList');
const sourceCount   = document.getElementById('sourceCount');
const pageCanvas    = document.getElementById('pageCanvas');
const emptyState    = document.getElementById('emptyState');
const canvasInfo    = document.getElementById('canvasInfo');
const statsText     = document.getElementById('statsText');
const exportBtn     = document.getElementById('exportBtn');
const progressWrap  = document.getElementById('progressWrap');
const progressBar   = document.getElementById('progressBar');
const statusText    = document.getElementById('statusText');
const toast         = document.getElementById('toast');
const rotateLeftBtn = document.getElementById('rotateLeftBtn');
const rotate180Btn  = document.getElementById('rotate180Btn');
const rotateRightBtn= document.getElementById('rotateRightBtn');
const selectAllBtn  = document.getElementById('selectAllCanvasBtn');
const selectNoneBtn = document.getElementById('selectNoneBtn');
const removeSelBtn  = document.getElementById('removeSelectedBtn');
const viewToggleBtn = document.getElementById('viewToggleBtn');

// ── Toast ──────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, dur=2600) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
}

// ── Drag & Drop upload ─────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (!files.length) { showToast('⚠️ 請選擇 PDF 檔案'); return; }
  files.forEach(handleFile);
});
fileInput.addEventListener('change', () => {
  [...fileInput.files].forEach(handleFile);
  fileInput.value = '';
});

function formatBytes(b) {
  if (b < 1048576) return (b/1024).toFixed(0) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

const STRIPE_COLORS = ['stripe-0','stripe-1','stripe-2','stripe-3','stripe-4','stripe-5'];

async function handleFile(file) {
  if (sources.find(s => s.name === file.name)) {
    showToast(`「${file.name}」已載入`); return;
  }
  const ab = await file.arrayBuffer();
  let pdfDoc;
  try { pdfDoc = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise; }
  catch(e) { showToast(`❌ 無法讀取「${file.name}」`); return; }

  const id = Date.now() + sources.length;
  const colorClass = STRIPE_COLORS[sources.length % STRIPE_COLORS.length];
  const src = { id, name: file.name, size: file.size, pdfDoc, arrayBuffer: ab, colorClass, thumbDataURLs: [] };
  sources.push(src);
  updateSourceCount();
  renderSourceItem(src);
  renderSourceThumbs(src);
}

function updateSourceCount() {
  sourceCount.textContent = sources.length ? `${sources.length} 個檔案` : '尚無檔案';
}

function renderSourceItem(src) {
  // Clear placeholder
  const placeholder = sourceList.querySelector('div[style]');
  if (placeholder) placeholder.remove();

  const el = document.createElement('div');
  el.className = 'source-item';
  el.dataset.srcId = src.id;

  const head = document.createElement('div');
  head.className = 'source-item-head';
  head.innerHTML = `
    <span class="src-icon">📄</span>
    <span class="src-name" title="${src.name}">${src.name}</span>
    <span class="src-pages" data-pages-label>載入中…</span>
    <button class="src-remove" data-srcid="${src.id}" title="移除此檔案">✕</button>
  `;
  head.querySelector('.src-remove').addEventListener('click', e => {
    e.stopPropagation(); removeSource(src.id);
  });
  // Expand/collapse
  head.addEventListener('click', () => {
    const grid = el.querySelector('.src-thumb-grid');
    const row = el.querySelector('.add-all-row');
    if (grid) { grid.style.display = grid.style.display === 'none' ? 'grid' : 'none'; }
    if (row) { row.style.display = row.style.display === 'none' ? 'flex' : 'none'; }
  });

  el.appendChild(head);
  sourceList.appendChild(el);
  src._el = el;
}

async function renderSourceThumbs(src) {
  const el = src._el;
  const pagesCount = src.pdfDoc.numPages;
  el.querySelector(`[data-pages-label]`).textContent = `${pagesCount} 頁`;

  const thumbGrid = document.createElement('div');
  thumbGrid.className = 'src-thumb-grid';
  const addAllRow = document.createElement('div');
  addAllRow.className = 'add-all-row';
  addAllRow.innerHTML = `
    <button class="mini-btn" data-action="addall" data-srcid="${src.id}">全部加入</button>
    <button class="mini-btn" data-action="removeall" data-srcid="${src.id}">移除全部</button>
  `;
  addAllRow.querySelectorAll('.mini-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.action === 'addall') {
        for (let i = 0; i < pagesCount; i++) addPageToCanvas(src, i);
      } else {
        removeSourcePagesFromCanvas(src.id);
      }
    });
  });
  el.appendChild(addAllRow);
  el.appendChild(thumbGrid);

  const scale = 0.6;
  for (let i = 0; i < pagesCount; i++) {
    const page = await src.pdfDoc.getPage(i + 1);
    const vp = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    // Store as data URL — canvas.cloneNode() does NOT copy drawn pixels,
    // so we convert to an image that can be reused anywhere.
    src.thumbDataURLs[i] = canvas.toDataURL('image/png');

    const wrap = document.createElement('div');
    wrap.className = 'src-thumb';
    wrap.dataset.pageIdx = i;
    const badge = document.createElement('div');
    badge.className = 'add-badge'; badge.textContent = '✓';
    const num = document.createElement('div');
    num.className = 'src-thumb-num'; num.textContent = `p.${i+1}`;
    const img = document.createElement('img');
    img.src = src.thumbDataURLs[i];
    img.style.width = '100%';
    img.style.display = 'block';
    wrap.appendChild(img);
    wrap.appendChild(badge); wrap.appendChild(num);
    wrap.addEventListener('click', () => {
      if (wrap.classList.contains('added')) {
        removeSourcePageFromCanvas(src.id, i, wrap);
      } else {
        addPageToCanvas(src, i);
        wrap.classList.add('added');
      }
    });
    src._thumbWraps = src._thumbWraps || [];
    src._thumbWraps[i] = wrap;
    thumbGrid.appendChild(wrap);
  }
}

function removeSource(id) {
  const idx = sources.findIndex(s => s.id === id);
  if (idx === -1) return;
  sources[idx]._el.remove();
  sources.splice(idx, 1);
  // Remove all canvas pages from this source
  removeSourcePagesFromCanvas(id);
  updateSourceCount();
  if (!sources.length) {
    sourceList.innerHTML = `<div style="text-align:center; padding:1.5rem 0; color:var(--text-muted); font-size:0.8rem;">上傳 PDF 後，在此選取要加入的頁面</div>`;
  }
}

// ── Canvas Page Management ─────────────────────────────────────
function addPageToCanvas(src, pageIndex) {
  const entry = { sourceId: src.id, srcName: src.name, colorClass: src.colorClass, pageIndex, rotation: 0, cardEl: null };
  canvasPages.push(entry);
  const cardEl = createPageCard(entry, canvasPages.length - 1);
  entry.cardEl = cardEl;
  pageCanvas.appendChild(cardEl);
  showCanvas();
  updateCanvasInfo();
  initSortable();
}

function removeSourcePagesFromCanvas(srcId) {
  // Remove in reverse to keep indices stable
  for (let i = canvasPages.length - 1; i >= 0; i--) {
    if (canvasPages[i].sourceId === srcId) {
      canvasPages[i].cardEl.remove();
      canvasPages.splice(i, 1);
      selectedCards.delete(i);
    }
  }
  rebuildSelectedSet();
  updateThumbAddedStates();
  updateCanvasInfo();
  if (!canvasPages.length) hideCanvas();
}

function removeSourcePageFromCanvas(srcId, pageIndex, thumbEl) {
  for (let i = canvasPages.length - 1; i >= 0; i--) {
    if (canvasPages[i].sourceId === srcId && canvasPages[i].pageIndex === pageIndex) {
      canvasPages[i].cardEl.remove();
      canvasPages.splice(i, 1);
      break;
    }
  }
  rebuildSelectedSet();
  if (thumbEl) thumbEl.classList.remove('added');
  updateCanvasInfo();
  if (!canvasPages.length) hideCanvas();
}

function createPageCard(entry, idx) {
  const src = sources.find(s => s.id === entry.sourceId);
  const card = document.createElement('div');
  card.className = 'page-card';
  card.dataset.idx = idx;
  card.dataset.rotation = entry.rotation;

  // Preview
  const preview = document.createElement('div');
  preview.className = 'card-preview';
  if (src && src.thumbDataURLs[entry.pageIndex]) {
    const img = document.createElement('img');
    img.src = src.thumbDataURLs[entry.pageIndex];
    img.style.width = '100%';
    img.style.display = 'block';
    img.style.transform = `rotate(${entry.rotation}deg)`;
    preview.appendChild(img);
  }

  // Rotation badge
  const rotBadge = document.createElement('div');
  rotBadge.className = 'rotation-badge';
  rotBadge.textContent = entry.rotation ? `${entry.rotation}°` : '';
  preview.appendChild(rotBadge);

  // Select overlay
  const selOverlay = document.createElement('div');
  selOverlay.className = 'card-select-overlay';
  selOverlay.textContent = '✓';
  preview.appendChild(selOverlay);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const badge = document.createElement('div');
  badge.className = `card-source-badge ${entry.colorClass}`;
  badge.title = entry.srcName;
  const shortName = entry.srcName.replace('.pdf','').substring(0,8);
  badge.textContent = shortName;

  const num = document.createElement('div');
  num.className = 'card-page-num';
  num.textContent = `p.${entry.pageIndex + 1}`;

  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const rotLBtn = document.createElement('button');
  rotLBtn.className = 'card-btn'; rotLBtn.title = '左轉 90°'; rotLBtn.textContent = '↺';
  rotLBtn.addEventListener('click', e => { e.stopPropagation(); rotateCard(card, -90); });

  const rotRBtn = document.createElement('button');
  rotRBtn.className = 'card-btn'; rotRBtn.title = '右轉 90°'; rotRBtn.textContent = '↻';
  rotRBtn.addEventListener('click', e => { e.stopPropagation(); rotateCard(card, 90); });

  const delBtn = document.createElement('button');
  delBtn.className = 'card-btn remove'; delBtn.title = '移除'; delBtn.textContent = '✕';
  delBtn.addEventListener('click', e => { e.stopPropagation(); removeCard(card); });

  actions.appendChild(rotLBtn);
  actions.appendChild(rotRBtn);
  actions.appendChild(delBtn);
  footer.appendChild(badge); footer.appendChild(num); footer.appendChild(actions);
  card.appendChild(preview); card.appendChild(footer);

  // Click to select
  card.addEventListener('click', e => {
    if (e.target.closest('.card-btn')) return;
    toggleCardSelection(card);
  });

  return card;
}

function rotateCard(card, delta) {
  const idx = getCardIndex(card);
  if (idx === -1) return;
  const entry = canvasPages[idx];
  entry.rotation = ((entry.rotation + delta) % 360 + 360) % 360;
  card.dataset.rotation = entry.rotation;
  // Update preview image rotation
  const img = card.querySelector('.card-preview img');
  if (img) {
    img.style.transform = `rotate(${entry.rotation}deg)`;
  }
  const badge = card.querySelector('.rotation-badge');
  if (badge) badge.textContent = entry.rotation ? `${entry.rotation}°` : '';
}

function removeCard(card) {
  const idx = getCardIndex(card);
  if (idx === -1) return;
  canvasPages.splice(idx, 1);
  card.remove();
  selectedCards.delete(idx);
  rebuildSelectedSet();
  updateThumbAddedStates();
  updateCanvasInfo();
  if (!canvasPages.length) hideCanvas();
}

function getCardIndex(card) {
  return [...pageCanvas.children].indexOf(card);
}

function toggleCardSelection(card) {
  const idx = getCardIndex(card);
  if (idx === -1) return;
  card.classList.toggle('selected');
  if (card.classList.contains('selected')) selectedCards.add(idx);
  else selectedCards.delete(idx);
}

function rebuildSelectedSet() {
  const newSet = new Set();
  [...pageCanvas.children].forEach((card, i) => {
    if (card.classList.contains('selected')) newSet.add(i);
  });
  selectedCards = newSet;
}

function updateThumbAddedStates() {
  const addedSet = new Set(canvasPages.map(e => `${e.sourceId}_${e.pageIndex}`));
  sources.forEach(src => {
    if (!src._thumbWraps) return;
    src._thumbWraps.forEach((wrap, i) => {
      if (!wrap) return;
      wrap.classList.toggle('added', addedSet.has(`${src.id}_${i}`));
    });
  });
}

// Toolbar actions
selectAllBtn.addEventListener('click', () => {
  [...pageCanvas.children].forEach((card, i) => {
    card.classList.add('selected');
    selectedCards.add(i);
  });
});
selectNoneBtn.addEventListener('click', () => {
  [...pageCanvas.children].forEach(card => card.classList.remove('selected'));
  selectedCards.clear();
});
removeSelBtn.addEventListener('click', () => {
  const toRemove = [...pageCanvas.children].filter(c => c.classList.contains('selected'));
  if (!toRemove.length) { showToast('請先選取要移除的頁面'); return; }
  toRemove.forEach(card => removeCard(card));
  selectedCards.clear();
});
rotateLeftBtn.addEventListener('click', () => applyRotationToSelected(-90));
rotate180Btn.addEventListener('click', () => applyRotationToSelected(180));
rotateRightBtn.addEventListener('click', () => applyRotationToSelected(90));

function applyRotationToSelected(delta) {
  const cards = [...pageCanvas.children];
  const targets = cards.filter(c => c.classList.contains('selected'));
  if (!targets.length) { showToast('請先選取要旋轉的頁面'); return; }
  targets.forEach(card => rotateCard(card, delta));
}

// View toggle
viewToggleBtn.addEventListener('click', () => {
  isGridView = !isGridView;
  pageCanvas.classList.toggle('list-view', !isGridView);
  viewToggleBtn.textContent = isGridView ? '⊞ 格狀' : '☰ 列表';
});

// ── Sortable ───────────────────────────────────────────────────
function initSortable() {
  if (sortable) { sortable.destroy(); }
  sortable = Sortable.create(pageCanvas, {
    animation: 180,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    onEnd() {
      // Rebuild canvasPages order to match DOM
      const cards = [...pageCanvas.children];
      const reordered = cards.map(card => {
        const domIdx = parseInt(card.dataset.idx);
        return canvasPages[domIdx] || canvasPages.find((_, i) => i === domIdx);
      });
      canvasPages.length = 0;
      reordered.forEach(e => canvasPages.push(e));
      cards.forEach((card, i) => { card.dataset.idx = i; });
      rebuildSelectedSet();
    }
  });
}

// ── Canvas state ───────────────────────────────────────────────
function showCanvas() {
  emptyState.style.display = 'none';
  pageCanvas.style.display = 'grid';
}
function hideCanvas() {
  emptyState.style.display = 'flex';
  pageCanvas.style.display = 'none';
}
function updateCanvasInfo() {
  const n = canvasPages.length;
  canvasInfo.textContent = `${n} 頁`;
  statsText.textContent = n ? `共 ${n} 頁` : '尚無頁面';
  exportBtn.disabled = n === 0;
  // Re-index cards
  [...pageCanvas.children].forEach((card, i) => { card.dataset.idx = i; });
}

// ── Export ─────────────────────────────────────────────────────
exportBtn.addEventListener('click', exportPDF);

async function exportPDF() {
  if (!canvasPages.length) return;
  exportBtn.disabled = true;
  progressWrap.style.display = 'block';
  statusText.style.display = 'block';
  progressBar.style.width = '5%';
  statusText.textContent = '準備中…';

  try {
    const newDoc = await PDFLib.PDFDocument.create();
    const srcMap = new Map();

    // Load each source PDF via pdf-lib
    for (const src of sources) {
      const libDoc = await PDFLib.PDFDocument.load(src.arrayBuffer.slice(0));
      srcMap.set(src.id, libDoc);
    }
    progressBar.style.width = '25%';

    const cards = [...pageCanvas.children];
    const total = cards.length;

    for (let ci = 0; ci < total; ci++) {
      const card = cards[ci];
      const idx = parseInt(card.dataset.idx);
      const entry = canvasPages[idx];
      if (!entry) continue;

      const srcDoc = srcMap.get(entry.sourceId);
      if (!srcDoc) continue;

      const [copied] = await newDoc.copyPages(srcDoc, [entry.pageIndex]);
      const rotation = entry.rotation;
      if (rotation) {
        const current = copied.getRotation().angle;
        copied.setRotation(PDFLib.degrees((current + rotation) % 360));
      }
      newDoc.addPage(copied);

      const pct = 25 + Math.round(((ci + 1) / total) * 65);
      progressBar.style.width = `${pct}%`;
      statusText.textContent = `處理第 ${ci + 1} / ${total} 頁…`;
    }

    statusText.textContent = '產生 PDF…';
    progressBar.style.width = '95%';
    const bytes = await newDoc.save();
    progressBar.style.width = '100%';

    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pdf-studio-output-${Date.now()}.pdf`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`✅ 已匯出 ${total} 頁 PDF`);
  } catch(e) {
    console.error(e);
    showToast('❌ 匯出失敗，請重新嘗試');
  } finally {
    setTimeout(() => {
      progressWrap.style.display = 'none';
      progressBar.style.width = '0';
      statusText.style.display = 'none';
    }, 1200);
    exportBtn.disabled = canvasPages.length === 0;
  }
}
</script>
