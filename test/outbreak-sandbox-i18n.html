<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outbreak Response Sandbox · OASIS</title>
<style>
  :root{
    --bg:#0B1626; --bg2:#0E1E33; --panel:#13243B; --panel2:#172B45;
    --line:#26405E; --line2:#34577A;
    --txt:#EAF1F8; --muted:#90A6BD; --faint:#637B95;
    --teal:#4FC9C0; --mint:#85C79C; --gold:#D6AC6A; --coral:#E37F62;
    --info:#7FB6E0; --sand:#C7A782; --intl:#9DB4FF;
    --ok:#5FBE8E; --warn:#E0B057;
    --inset:#0A1422; --bubble:#D4E2EF; --probtx:#F2DCD2;
    --h1grad:linear-gradient(100deg,#EAF1F8,#9FD8D2 60%,#D6AC6A);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"PingFang TC","Microsoft JhengHei","Noto Sans TC","Helvetica Neue",sans-serif;
  }
  body.light{
    --bg:#F4F7FB; --bg2:#E9F0F8; --panel:#FFFFFF; --panel2:#F1F6FC;
    --line:#D4DEEA; --line2:#BDCDDE;
    --txt:#15263A; --muted:#566B82; --faint:#8395AA;
    --teal:#1C9A8E; --mint:#3E9E63; --gold:#B6862C; --coral:#CF5C3C;
    --info:#2C6FA6; --sand:#9A7A48; --intl:#4258B8;
    --inset:#EEF3F9; --bubble:#243B52; --probtx:#7A3A28;
    --h1grad:linear-gradient(100deg,#15263A,#1F9488 55%,#B7872E);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--sans); color:var(--txt); line-height:1.65;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(79,201,192,.10), transparent 60%),
      radial-gradient(900px 500px at 0% 0%, rgba(127,182,224,.08), transparent 55%),
      var(--bg);
    background-attachment:fixed; min-height:100vh; -webkit-font-smoothing:antialiased;
    transition:background .4s,color .4s;
  }
  body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.35;
    background-image:linear-gradient(rgba(52,87,122,.10) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(52,87,122,.10) 1px,transparent 1px);
    background-size:46px 46px;}
  .wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:0 22px 90px}

  /* toolbar */
  .toolbar{display:flex; justify-content:flex-end; align-items:center; gap:10px; padding:18px 0 0}
  .seg{display:inline-flex; border:1px solid var(--line2); border-radius:999px; overflow:hidden; background:var(--panel2)}
  .seg button{cursor:pointer; border:none; background:transparent; color:var(--muted); font-weight:800;
    font-size:13px; padding:8px 15px; font-family:var(--sans); transition:.2s}
  .seg button:hover{color:var(--txt)}
  .seg button.active{background:linear-gradient(120deg,var(--teal),var(--mint)); color:#06121E}
  .themebtn{cursor:pointer; border:1px solid var(--line2); background:var(--panel2); color:var(--muted);
    border-radius:999px; padding:8px 14px; font-weight:800; font-size:13px; font-family:var(--sans); transition:.2s}
  .themebtn:hover{color:var(--txt); border-color:var(--teal)}

  /* header */
  header{padding:22px 0 26px; text-align:center}
  .badge{display:inline-flex; align-items:center; gap:8px; font-size:12.5px; letter-spacing:.14em;
    color:var(--teal); border:1px solid var(--line2); border-radius:999px; padding:6px 15px;
    background:rgba(79,201,192,.06); text-transform:uppercase; font-family:var(--mono)}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);animation:pulse 1.8s infinite}
  h1{font-size:clamp(26px,4.4vw,44px); font-weight:800; letter-spacing:.01em; margin:20px 0 10px;
    background:var(--h1grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .sub{color:var(--muted); font-size:clamp(14px,1.7vw,17px); max-width:700px; margin:0 auto}

  .concept{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:30px 0 8px}
  @media(max-width:720px){.concept{grid-template-columns:1fr}}
  .concept .c{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line); border-radius:14px; padding:16px 18px}
  .concept .c b{display:block; color:var(--teal); font-size:14px; margin-bottom:5px}
  .concept .c span{color:var(--muted); font-size:13px}

  .prob{display:flex; gap:14px; align-items:flex-start; margin:26px 0 22px;
    background:linear-gradient(110deg,rgba(227,127,98,.10),rgba(19,36,59,.4));
    border:1px solid rgba(227,127,98,.35); border-left:4px solid var(--coral); border-radius:14px; padding:16px 20px}
  .prob .ic{font-size:22px; line-height:1}
  .prob b{color:var(--coral)}
  .prob p{color:var(--probtx); font-size:14.5px; margin-top:2px}

  .console{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
    border-radius:18px; padding:22px; box-shadow:0 24px 60px rgba(0,0,0,.18)}
  .console .bar{display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding-bottom:16px; margin-bottom:18px; border-bottom:1px dashed var(--line)}
  .console .bar .title{font-weight:800; font-size:18px}
  .console .bar .scn{color:var(--muted); font-size:12.5px; font-family:var(--mono); text-align:right; max-width:48%}

  .btn{cursor:pointer; border:none; border-radius:11px; padding:12px 20px; font-weight:800; font-size:15px;
    font-family:var(--sans); transition:.2s; color:#06121E;
    background:linear-gradient(120deg,var(--teal),var(--mint)); box-shadow:0 8px 22px rgba(79,201,192,.28)}
  .btn:hover{transform:translateY(-2px); box-shadow:0 12px 30px rgba(79,201,192,.4)}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none}
  .btn.ghost{background:transparent; border:1px solid var(--line2); color:var(--muted); box-shadow:none}
  .btn.ghost:hover{color:var(--txt); border-color:var(--teal)}

  .taskpick{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:6px}
  .chip{cursor:pointer; border:1px solid var(--line2); background:var(--panel2); color:var(--muted);
    border-radius:999px; padding:8px 15px; font-size:13px; font-weight:700; transition:.2s}
  .chip:hover{color:var(--txt); border-color:var(--teal)}
  .chip.active{color:#06121E; background:var(--teal); border-color:transparent}

  .epi{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin:4px 0 20px}
  .epi .e{background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--teal); border-radius:11px; padding:11px 13px}
  .epi .e .k{font-size:10.5px; color:var(--faint); font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase}
  .epi .e .v{font-size:13px; color:var(--txt); font-weight:700; margin-top:4px; line-height:1.45}
  .epi .e.warn{border-left-color:var(--coral)} .epi .e.gold{border-left-color:var(--gold)} .epi .e.mint{border-left-color:var(--mint)}
  .epi-src{grid-column:1/-1; color:var(--faint); font-size:11px; font-family:var(--mono); margin-top:2px; line-height:1.5}

  .grid1{display:grid; grid-template-columns:1.05fr 1fr; gap:20px}
  @media(max-width:860px){.grid1{grid-template-columns:1fr}}
  .agents{display:grid; grid-template-columns:1fr 1fr; gap:12px; align-content:start}
  .agent{position:relative; background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:14px; transition:.3s; overflow:hidden}
  .agent .row{display:flex; align-items:center; gap:9px}
  .agent .av{width:34px;height:34px;border-radius:10px; display:grid; place-items:center; font-size:17px; background:rgba(127,127,127,.10)}
  .agent .nm{font-weight:800; font-size:13.5px}
  .agent .fn{color:var(--muted); font-size:11.5px; margin-top:8px; line-height:1.5}
  .agent .st{position:absolute; top:12px; right:12px; font-size:10px; font-family:var(--mono); color:var(--faint); letter-spacing:.06em}
  .agent.live{border-color:var(--ac); box-shadow:0 0 0 1px var(--ac),0 0 26px -6px var(--ac)}
  .agent.live .st{color:var(--ac)}
  .agent.live::after{content:""; position:absolute; left:0; top:0; height:3px; width:100%; background:var(--ac); animation:scan 1.1s linear infinite}
  .agent.human{border-style:dashed; border-color:var(--mint)}
  .agent.human .av{background:rgba(133,199,156,.16)}

  .feed{background:var(--inset); border:1px solid var(--line); border-radius:14px; padding:14px; height:400px; overflow-y:auto; font-size:13.5px}
  .feed::-webkit-scrollbar{width:8px}.feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
  .msg{margin-bottom:11px; opacity:0; transform:translateY(6px); animation:rise .4s forwards}
  .msg .who{font-family:var(--mono); font-size:11.5px; font-weight:700; letter-spacing:.03em}
  .msg .tx{color:var(--bubble); margin-top:2px}
  .msg.sys .tx{color:var(--muted); font-style:italic}
  .feed .placeholder{color:var(--faint); text-align:center; padding-top:160px; font-size:13px}

  .decision{margin-top:16px; border:1px solid var(--gold); background:rgba(214,172,106,.07); border-radius:14px; padding:16px; animation:rise .4s}
  .decision .q{font-weight:800; color:var(--gold); margin-bottom:12px; display:flex; align-items:center; gap:8px}
  .opts{display:grid; gap:10px}
  .opt{cursor:pointer; text-align:left; border:1px solid var(--line2); background:var(--panel2); color:var(--txt);
    border-radius:11px; padding:13px 15px; font-size:14px; font-weight:600; transition:.2s; font-family:var(--sans)}
  .opt:hover{border-color:var(--gold); background:var(--panel); transform:translateX(3px)}
  .opt .lbl{font-family:var(--mono); color:var(--gold); margin-right:9px; font-weight:800}

  .score{margin-top:16px; border:1px solid var(--line2); background:rgba(127,182,224,.06); border-radius:14px; padding:18px; animation:rise .4s}
  .score h4{color:var(--info); font-size:14px; margin-bottom:14px; display:flex; align-items:center; gap:8px}
  .meter{margin-bottom:13px}
  .meter .lab{display:flex; justify-content:space-between; font-size:12.5px; color:var(--muted); margin-bottom:5px}
  .meter .lab b{color:var(--txt); font-family:var(--mono)}
  .track{height:9px; background:var(--inset); border-radius:6px; overflow:hidden}
  .fill{height:100%; width:0; border-radius:6px; transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .verdict{margin-top:6px; color:var(--bubble); font-size:13.5px; border-top:1px dashed var(--line); padding-top:13px}

  .kpis{margin-top:24px}
  .kpis h3{font-size:15px; color:var(--gold); margin-bottom:14px; display:flex; align-items:center; gap:9px; letter-spacing:.03em}
  .kgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:13px}
  .kpi{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line); border-top:3px solid var(--teal); border-radius:13px; padding:15px 16px}
  .kpi .v{font-family:var(--mono); font-weight:800; font-size:24px; color:var(--teal)}
  .kpi .l{color:var(--muted); font-size:12.5px; margin-top:4px}
  .kpi.g{border-top-color:var(--gold)} .kpi.g .v{color:var(--gold)}
  .kpi.m{border-top-color:var(--mint)} .kpi.m .v{color:var(--mint)}
  .kpi.c{border-top-color:var(--coral)} .kpi.c .v{color:var(--coral)}

  footer{margin-top:46px; border-top:1px solid var(--line); padding-top:24px; text-align:center}
  .gov{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:14px}
  .gov .g{font-size:13px; color:var(--muted); border:1px solid var(--line); border-radius:10px; padding:9px 15px}
  footer .src{color:var(--faint); font-size:12px; font-family:var(--mono); max-width:760px; margin:0 auto; line-height:1.6}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  @keyframes rise{to{opacity:1; transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="seg" id="langseg">
      <button data-lang="zh" class="active">中</button>
      <button data-lang="en">EN</button>
      <button data-lang="fil">FIL</button>
    </div>
    <button class="themebtn" id="themebtn">☀️ <span id="theme-label">Light</span></button>
  </div>

  <header>
    <span class="badge"><span class="dot"></span><span id="ui-badge"></span></span>
    <h1 id="ui-h1"></h1>
    <p class="sub" id="ui-sub"></p>
    <div class="concept">
      <div class="c"><b id="c1t"></b><span id="c1d"></span></div>
      <div class="c"><b id="c2t"></b><span id="c2d"></span></div>
      <div class="c"><b id="c3t"></b><span id="c3d"></span></div>
    </div>
  </header>

  <div class="prob">
    <div class="ic">⚠️</div>
    <div><b id="prob-label"></b><p id="prob-text"></p></div>
  </div>

  <div class="console">
    <div class="bar">
      <div><div class="title">🛰️ <span id="console-title"></span></div></div>
      <div class="scn" id="m1-scn"></div>
    </div>

    <div class="taskpick">
      <span style="color:var(--muted);font-size:13px;margin-right:4px" id="lbl-select"></span>
      <button class="chip active" data-scn="unknown" id="chip-unknown"></button>
      <button class="chip" data-scn="andes" id="chip-andes"></button>
      <button class="chip" data-scn="bundibugyo" id="chip-bundibugyo"></button>
      <button class="chip" data-scn="palawan" id="chip-palawan"></button>
    </div>

    <div class="epi" id="m1-params"></div>

    <div class="grid1">
      <div class="agents" id="m1-agents"></div>
      <div><div class="feed" id="m1-feed"></div></div>
    </div>

    <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap">
      <button class="btn" id="m1-start"></button>
      <button class="btn ghost" id="m1-reset"></button>
    </div>

    <div id="m1-decision"></div>
    <div id="m1-score"></div>
  </div>

  <div class="kpis">
    <h3 id="kpi-h3"></h3>
    <div class="kgrid">
      <div class="kpi"><div class="v">≥ 4</div><div class="l" id="k1l"></div></div>
      <div class="kpi g"><div class="v">≥ 4</div><div class="l" id="k2l"></div></div>
      <div class="kpi m"><div class="v">≥ 100</div><div class="l" id="k3l"></div></div>
      <div class="kpi c"><div class="v">≥ 1</div><div class="l" id="k4l"></div></div>
      <div class="kpi"><div class="v">×1</div><div class="l" id="k5l"></div></div>
    </div>
  </div>

  <footer>
    <div class="gov">
      <div class="g" id="gov1"></div>
      <div class="g" id="gov2"></div>
      <div class="g" id="gov3"></div>
    </div>
    <div class="src" id="ui-src"></div>
  </footer>
</div>

<script>
const L=(zh,en,fil)=>({zh,en,fil});
let LANG='zh', THEME='dark';
const T=o=>o?(o[LANG]||o.zh):'';
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ---------------- UI strings ---------------- */
const UI={
  badge:L('OASIS · 疫情應變實戰沙盒','OASIS · Outbreak Response Sandbox','OASIS · Sandbox sa Pagtugon sa Outbreak'),
  h1:L('疫情應變實戰沙盒','Outbreak Response Sandbox','Sandbox sa Pagtugon sa Outbreak'),
  sub:L('不是一個「全能 AI」，而是一群各有專長的 AI 分工協作、彼此對話，最後由「人」做決策。請親自操作下列情境，感受 multi-agent 的真實協作。',
        'Not one all-knowing AI, but a team of specialised AI agents that divide the work, talk to each other, and leave the final call to a human. Run a scenario below to feel real multi-agent collaboration.',
        'Hindi iisang all-knowing na AI, kundi pangkat ng espesyalisadong AI agents na naghahati ng trabaho, nag-uusap, at ang huling desisyon ay nasa tao. Subukan ang isang senaryo sa ibaba.'),
  c1t:L('各司其職','Specialised roles','Espesyalisadong tungkulin'),
  c1d:L('每個 agent 只專精一件事，像一支分工明確的專業團隊。','Each agent masters one thing, like a well-divided expert team.','Bawat agent ay eksperto sa isang bagay, parang organisadong team.'),
  c2t:L('即時對話','Real-time dialogue','Real-time na usapan'),
  c2d:L('agents 之間互相傳遞情報與成果，協作完成複雜任務。','Agents pass intel and outputs to each other to solve complex tasks.','Nagpapasahan ng intel ang mga agent para tapusin ang kumplikadong gawain.'),
  c3t:L('人為把關','Human in the loop','Tao ang nasa loop'),
  c3d:L('AI 做粗活與研判，關鍵決策與責任，永遠在人。','AI does the legwork; the key decision and accountability stay with people.','AI ang gumagawa ng legwork; ang mahalagang desisyon ay nasa tao.'),
  probLabel:L('它解決什麼問題？','What problem does it solve?','Anong problema ang nilulutas nito?'),
  probText:L('真實疫情不能重來，也不能拿同仁的失誤換經驗。本沙盒用 AI 打造「會動」的虛擬疫情，讓同仁在零風險環境中反覆實戰。下列情境參數均依真實流行病學數據建模。',
             'A real outbreak offers no do-overs and no room to learn from staff mistakes. This sandbox uses AI to build a living virtual outbreak so teams can practise repeatedly at zero risk. All scenario parameters are modelled on real epidemiological data.',
             'Walang ulit sa totoong outbreak. Gumagamit ang sandbox na ito ng AI para gumawa ng buhay na virtual outbreak para makapag-ensayo nang paulit-ulit nang walang panganib. Lahat ng parameter ay base sa totoong datos.'),
  consoleTitle:L('疫情應變演練 · 即時態勢','Outbreak Drill · Live Situation','Outbreak Drill · Live na Sitwasyon'),
  selectScn:L('選擇情境：','Select scenario:','Pumili ng senaryo:'),
  start:L('▶ 啟動演練','▶ Start drill','▶ Simulan'),
  reset:L('↺ 重新演練','↺ Reset','↺ I-reset'),
  placeholder:L('按下「啟動演練」，觀察各 AI agent 如何即時協作、互相回報情報 →',
                'Press Start drill and watch the AI agents collaborate and report in real time →',
                'Pindutin ang Simulan at panoorin ang mga AI agent na magtulungan at mag-ulat →'),
  sysStart:L('演練啟動 — 多 agent 環境上線，情境注入中…','Drill started — multi-agent environment online, injecting scenario…','Nagsimula — online na ang multi-agent, ini-inject ang senaryo…'),
  sysHandoff:L('情報已彙整。指揮官，多個 agent 的態勢同時湧入——這就是真實疫情的壓力。請下達您的決策。',
               'Intel consolidated. Commander, multiple agents are reporting at once — this is the pressure of a real outbreak. Make your call.',
               'Nakolekta na ang intel. Komander, sabay-sabay nag-uulat ang mga agent — ito ang presyon ng totoong outbreak. Magdesisyon.'),
  decideLog:L('決策','Decision','Desisyon'),
  scoring:L('演練結束，正在自動評分…','Drill complete, auto-scoring…','Tapos na, nag-iiscore…'),
  scoreH:L('AI 教官 · 本次演練評分','AI Instructor · Drill Scorecard','AI Instructor · Scorecard'),
  mSpd:L('應變速度','Response speed','Bilis ng tugon'),
  mAcc:L('研判精準','Assessment accuracy','Katumpakan ng pagtaya'),
  mCom:L('風險溝通','Risk communication','Risk communication'),
  verdictLabel:L('教官講評：','Instructor note: ','Puna ng instruktor: '),
  noPerfect:L('※ 每個決策都有取捨，沒有滿分答案——這正是反覆演練的價值。試試其他選擇？',
              '※ Every decision is a trade-off; there is no perfect answer — that is the value of repeated drills. Try another option?',
              '※ May trade-off bawat desisyon; walang perpektong sagot — iyan ang halaga ng pag-eensayo. Subukan ang iba?'),
  kpiH:L('🎯 預期成果（2028–2031）','🎯 Expected outcomes (2028–2031)','🎯 Inaasahang resulta (2028–2031)'),
  k1:L('類 multi-agent 演練模組','multi-agent drill modules','multi-agent na module'),
  k2:L('種傳染病演練情境','infectious-disease scenarios','senaryo ng sakit'),
  k3:L('四年累積試訓人次','trainees over four years','trainee sa apat na taon'),
  k4:L('跨國聯合演習（菲／星）','cross-border joint drills (PH/SG)','cross-border na drill (PH/SG)'),
  k5:L('AI 自動評分機制','AI auto-scoring engine','AI auto-scoring'),
  gov1:L('治理原則：人類最後決策','Governance: a human makes the final call','Pamamahala: tao ang huling magdedesisyon'),

    const d=document.createElement('div');
    d.className='agent'+(a.human?' human':''); d.id='ag-'+id; d.style.setProperty('--ac',a.ac);
    d.innerHTML='<span class="st">'+T(UI.standby)+'</span>'+
      '<div class="row"><div class="av" style="color:'+a.ac+'">'+a.ic+'</div><div class="nm">'+T(a.nm)+'</div></div>'+
      '<div class="fn">'+T(a.fn)+'</div>';
    agentsEl.appendChild(d);
  });
}
function agentLive(id,on){const e=document.getElementById('ag-'+id); if(!e)return;
  e.classList.toggle('live',on); e.querySelector('.st').textContent=on?T(UI.liveOn):T(UI.standby);}

function renderParams(){
  const sc=SCN[curScn];
  const box=document.getElementById('m1-params');
  box.innerHTML=sc.params.map(p=>'<div class="e '+(p.cls||'')+'"><div class="k">'+T(p.k)+'</div><div class="v">'+T(p.v)+'</div></div>').join('')
    +'<div class="epi-src">'+T(sc.src)+'</div>';
}

function feedMsg(whoTxt,color,text,sys){
  const m=document.createElement('div'); m.className='msg'+(sys?' sys':'');
  m.innerHTML='<div class="who" style="color:'+color+'">〔'+whoTxt+'〕</div><div class="tx">'+text+'</div>';
  feedEl.appendChild(m); feedEl.scrollTop=feedEl.scrollHeight;
}
function clearFeed(){ feedEl.innerHTML='<div class="placeholder">'+T(UI.placeholder)+'</div>'; }

function switchScn(){
  const sc=SCN[curScn];
  setText('m1-scn',T(sc.scn));
  renderParams(); renderAgents(); clearFeed();
  document.getElementById('m1-decision').innerHTML='';
  document.getElementById('m1-score').innerHTML='';
}

async function runDrill(){
  if(running)return; running=true;
  document.getElementById('m1-start').disabled=true;
  const sc=SCN[curScn];
  feedEl.innerHTML=''; document.getElementById('m1-decision').innerHTML=''; document.getElementById('m1-score').innerHTML='';
  feedMsg(T(AGENT_DEFS.system.short),'var(--muted)',T(UI.sysStart),true);
  await sleep(700);
  for(const ev of sc.intro){
    const a=AGENT_DEFS[ev.a];
    agentLive(ev.a,true); await sleep(560);
    feedMsg(T(a.short),a.ac,T(ev.t));
    await sleep(1000); agentLive(ev.a,false);
  }
  await sleep(300);
  agentLive('human',true);
  feedMsg(T(AGENT_DEFS.coach.short),'var(--info)',T(UI.sysHandoff),true);
  showDecision(sc);
  document.getElementById('m1-start').disabled=false; running=false;
}

function showDecision(sc){
  const box=document.getElementById('m1-decision');
  box.innerHTML='<div class="decision"><div class="q">'+T(sc.decisionQ)+'</div><div class="opts" id="m1-opts"></div></div>';
  const o=document.getElementById('m1-opts');
  ['A','B','C'].forEach(k=>{
    const c=sc.choices[k]; if(!c)return;
    const b=document.createElement('button'); b.className='opt';
    b.innerHTML='<span class="lbl">'+k+'</span>'+T(c.text);
    b.onclick=()=>decide(k); o.appendChild(b);
  });
}
async function decide(k){
  const sc=SCN[curScn], c=sc.choices[k];
  document.getElementById('m1-decision').innerHTML='';
  feedMsg(T(AGENT_DEFS.human.short),'var(--mint)',T(UI.decideLog)+' '+k+'：'+T(c.text));
  agentLive('human',false); await sleep(500);
  for(const r of c.react){
    const a=AGENT_DEFS[r.a];
    agentLive(r.a,true); await sleep(520);
    feedMsg(T(a.short),a.ac,T(r.t));
    await sleep(840); agentLive(r.a,false);
  }
  await sleep(300); agentLive('coach',true);
  feedMsg(T(AGENT_DEFS.coach.short),'var(--info)',T(UI.scoring),true);
  await sleep(750); showScore(c); agentLive('coach',false);
}
function meter(name,val,color){
  return '<div class="meter"><div class="lab"><span>'+name+'</span><b>'+val+'</b></div>'+
    '<div class="track"><div class="fill" data-w="'+val+'" style="background:'+color+'"></div></div></div>';
}
function showScore(c){
  const box=document.getElementById('m1-score');
  box.innerHTML='<div class="score"><h4>🎖️ '+T(UI.scoreH)+'</h4>'+
    meter(T(UI.mSpd),c.s.spd,'var(--teal)')+
    meter(T(UI.mAcc),c.s.acc,'var(--gold)')+
    meter(T(UI.mCom),c.s.com,'var(--info)')+
    '<div class="verdict"><b style="color:var(--mint)">'+T(UI.verdictLabel)+'</b>'+T(c.v)+
    '<br><span style="color:var(--faint);font-size:12.5px">'+T(UI.noPerfect)+'</span></div></div>';
  requestAnimationFrame(()=>{document.querySelectorAll('#m1-score .fill').forEach(f=>f.style.width=f.dataset.w+'%');});
}

/* ---------------- events ---------------- */
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    if(running)return;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); curScn=c.dataset.scn; switchScn();
  });
});
document.getElementById('m1-start').onclick=runDrill;
document.getElementById('m1-reset').onclick=()=>{ if(running)return; switchScn(); };

document.querySelectorAll('#langseg button').forEach(b=>{
  b.addEventListener('click',()=>{
    if(running)return;
    LANG=b.dataset.lang; renderUI(); switchScn();
  });
});
document.getElementById('themebtn').addEventListener('click',()=>{
  THEME = (THEME==='dark')?'light':'dark';
  document.body.classList.toggle('light',THEME==='light');
  renderUI();
});

/* init */
renderUI(); switchScn();
</script>
</body>
</html>
